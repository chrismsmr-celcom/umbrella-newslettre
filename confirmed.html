<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription confirmée | Umbrella</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.6; }
        .btn { background: #f5c400; color: #0f172a; padding: 12px 30px; border-radius: 40px; text-decoration: none; font-weight: 700; display: inline-block; }
        .btn:hover { background: #e6b800; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fa fa-check-circle"></i></div>
        <h1>✅ Inscription confirmée !</h1>
        <p>Votre abonnement à la newsletter Umbrella est maintenant actif.</p>
        <p>Vous recevrez bientôt nos actualités et offres exclusives.</p>
        <a href="index.html" class="btn"><i class="fa fa-home"></i> Retour à l'accueil</a>
    </div>
</body>
</html>
